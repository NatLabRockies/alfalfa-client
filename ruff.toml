target-version = "py310"
fix = true
line-length = 140

[format]
docstring-code-format = true

# https://docs.astral.sh/ruff/linter/#rule-selection
[lint]
# Enable these rules
extend-select = [
    "A",   # flake8-builtins
    "ARG", # flake8-unused-arguments
    "BLE", # flake8-blind-except
    "C4",  # flake8-comprehensions
    "COM", # flake8-commas
    "E",   # Error
    "EXE", # flake8-executable
    "F",   # Pyflakes
    "I",   # isort
    "ICN", # flake8-import-conventions
    "ISC", # flake8-implicit-str-concat
    "N",   # pep8-naming
    "PD",  # pandas-vet
    "PGH", # pygrep-hooks
    "PIE", # flake8-pie
    "PLC", # Pylint Convention
    "PLE", # Pylint Error
    "PLR", # Pylint Refactor
    "PLW", # Pylint Warning
    "PT",  # flake8-pytest-style
    "Q",   # flake8-quotes
    "RUF", # Ruff-specific rules
    "S",   # flake8-bandit
    "SIM", # flake8-simplify
    "T10", # flake8-debugger
    "TID", # flake8-tidy-imports
    "UP",  # pyupgrade
]
# except for these specific errors
ignore = [
    "A001",    # builtin-variable-shadowing
    "ARG001",  # unused-function-argument
    "ARG002",  # unused-method-argument
    "ARG003",  # unused-class-method-argument
    "BLE001",  # blind-except
    "COM812",  # missing-trailing-comma
    "COM819",  # prohibited-trailing-comma
    "E501",    # line-too-long
    "ISC001",  # single-line-implicit-string-concatenation
    "N806",    # non-lowercase-variable-in-function
    "PLC0415", # `import` should be at the top-level of a file
    "PLC1901", # compare-to-empty-string (preview)
    "PLR0402", # manual-from-import
    "PLR0911", # too-many-return-statements
    "PLR0912", # too-many-branches
    "PLR0913", # too-many-arguments
    "PLR0915", # too-many-statements
    "PLR2004", # magic-value-comparison
    "PT009",   # pytest-unittest-assertion
    "Q000",    # bad-quotes-inline-string
    "RUF012",  # mutable-class-default
    "S106",    # hardcoded-password-func-arg
    "S311",    # suspicious-non-cryptographic-random-usage
    "S603",    # subprocess-without-shell-equals-true
    "S607",    # start-process-with-partial-path
    "S701",    # jinja2-autoescape-false
    "SIM108",  # if-else-block-instead-of-if-exp
]

[lint.per-file-ignores]
"tests/**" = [
    "S101", # assert
    "S105", # hardcoded-password-string
    "S307", # suspicious-eval-usage
]
"pacer_client/__init__.py" = [
    "F401", # unused-import: PacerClient is re-exported here for the public API
]
"pacer_client/lib.py" = [
    "N818", # error-suffix-on-exception-name: Alfalfa* names refer to the server, kept as-is
]
"pacer_client/pacer_client.py" = [
    "S101",   # assert: used to validate response status codes from the alfalfa server
    "S113",   # request-without-timeout: left to the caller's environment for now
    "SIM115", # open-file-with-context-handler: file handle must stay open for streaming multipart upload
]
