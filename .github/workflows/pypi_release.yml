name: PyPIRelease
# Publishes the package to PyPI when a GitHub Release is published.
# The release (and its git tag) is created in the GitHub UI or with `gh release create vX.Y.Z`;
# this workflow then builds the distributions and uploads them to PyPI.
#
# During the alfalfa-client -> pacer-client rename transition, the exact same release is
# published under BOTH PyPI project names so existing `alfalfa-client` users keep getting
# updates while everyone migrates to `pacer-client`. The wheel/sdist contents are identical
# (both the `pacer_client` package and the `alfalfa_client` compatibility shim are always
# included, see pyproject.toml); only the `name` in pyproject.toml is swapped before the
# `alfalfa-client` build.
#
# Authentication:
#   pacer-client  — PyPI Trusted Publishing (OIDC), environment: pypi_release
#   alfalfa-client — classic PyPI API token stored as the PYPI_API_TOKEN_ALFALFA secret in
#                    the pypi_release_alfalfa GitHub environment (Trusted Publishing cannot be
#                    used because it requires a Trusted Publisher entry on the PyPI project,
#                    which is not set up for the legacy alfalfa-client project name).
#                    To create the token: PyPI → alfalfa-client → Settings → API tokens.
# https://packaging.python.org/en/latest/guides/publishing-package-distribution-releases-using-github-actions-ci-cd-workflows/

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution 📦 (${{ matrix.pypi_name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pypi_name: [pacer-client, alfalfa-client]

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.x"
      - name: Install pypa/build
        run: >-
          python3 -m
          pip install --upgrade pip
          build
          --user
      - name: Set package name to ${{ matrix.pypi_name }}
        if: matrix.pypi_name != 'pacer-client'
        run: sed -i 's/^name = "pacer-client"/name = "${{ matrix.pypi_name }}"/' pyproject.toml
      - name: Build a binary wheel and a source tarball
        run: python3 -m build
      - name: Store the distribution packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions-${{ matrix.pypi_name }}
          path: dist/

  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI (${{ matrix.pypi_name }})
    needs:
      - build
    strategy:
      matrix:
        pypi_name: [pacer-client, alfalfa-client]
    runs-on: ubuntu-latest
    environment:
      name: ${{ matrix.pypi_name == 'pacer-client' && 'pypi_release' || 'pypi_release_alfalfa' }}
      url: https://pypi.org/p/${{ matrix.pypi_name }}
    permissions:
      id-token: write # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download the ${{ matrix.pypi_name }} dist
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions-${{ matrix.pypi_name }}
          path: dist/
      - name: Publish distribution 📦 to PyPI (trusted publishing)
        if: matrix.pypi_name == 'pacer-client'
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Publish distribution 📦 to PyPI (API token)
        if: matrix.pypi_name == 'alfalfa-client'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN_ALFALFA }}
          attestations: false
